services:
  mysql:
    image: mysql:8.0
    container_name: gizmolandia-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db
    volumes:
      -  mysql_data:/var/lib/mysql


  backend:
    build:
      context: ./Backend/api
    container_name: gizmolandia-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
    volumes:
      - ./Backend/api/uploads:/app/uploads
    depends_on:
      - mysql

  frontend:
    build:
      context: ./Fronted/lobby
    container_name: gizmolandia-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
    name: mysql_data
  