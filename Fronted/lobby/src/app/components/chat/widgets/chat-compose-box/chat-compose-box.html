<div class="compose-box">
  <div *ngIf="activeRoom === 'JUEGOS'" class="score-select-wrap">
    <label for="chatScore">{{ 'CHAT.COMPOSE.SCORE_LABEL' | translate }}</label>
    <select id="chatScore" [(ngModel)]="selectedScoreId">
      <option [ngValue]="null">{{ 'CHAT.COMPOSE.SCORE_PLACEHOLDER' | translate }}</option>
      <option *ngFor="let score of scoreOptions" [ngValue]="score.puntuacionId">
        {{ score.juego }} · {{ score.puntuacion }} · {{ score.fechaPartida | date: 'dd/MM HH:mm' }}
      </option>
    </select>
  </div>

  <label for="chatComment">{{ 'CHAT.COMPOSE.COMMENT_LABEL' | translate }}</label>
  <textarea
    id="chatComment"
    [(ngModel)]="commentText"
    rows="4"
    [placeholder]="'CHAT.COMPOSE.COMMENT_PLACEHOLDER' | translate"></textarea>
  <div class="word-counter" [class.over]="wordCount > 500">{{ 'CHAT.COMPOSE.WORD_COUNTER' | translate:{ count: wordCount } }}</div>

  <div class="media-controls">
    <label class="file-label" for="chatMedia">{{ 'CHAT.COMPOSE.MEDIA_LABEL' | translate }}</label>
    <input id="chatMedia" type="file" accept="image/png,image/jpeg,image/jpg,image/webp,image/gif" (change)="onFileSelected($event)">

    <div *ngIf="mediaUrl" class="media-preview">
      <img [src]="mediaUrl" alt="preview">
      <button type="button" (click)="clearMedia()">{{ 'CHAT.COMPOSE.REMOVE_MEDIA' | translate }}</button>
    </div>
  </div>

  <p *ngIf="error" class="error-text">{{ error }}</p>

  <button type="button" class="send-btn" [disabled]="sending" (click)="send()">
    {{ sending ? ('CHAT.COMPOSE.SENDING' | translate) : ('CHAT.COMPOSE.SEND' | translate) }}
  </button>
</div>
